<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据管理后台 - phone-link</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:微软雅黑;}
        body{background:#f5f5f5;padding:20px;}
        .container{max-width:900px;margin:0 auto;background:white;border-radius:12px;padding:25px;box-shadow:0 2px 15px #00000015;}
        h1,h2,h3{text-align:center;margin-bottom:20px;}
        input, button{padding:12px;margin:8px 0;border:1px solid #ddd;border-radius:8px;width:100%;font-size:16px;}
        button{background:#07c160;color:white;border:none;cursor:pointer;}
        button.delete{background:#ff4444;margin:0;}
        table{width:100%;border-collapse:collapse;margin-top:20px;}
        th, td{border:1px solid #eee;padding:12px;text-align:left;vertical-align:top;}
        th{background:#f8f9fa;}
        .link-cell{word-break:break-all;max-width:300px;}
        #jsonOutput{width:100%;height:280px;font-family:Consolas,monospace;font-size:14px;margin-top:10px;}
    </style>
</head>
<body>
<div class="container">
    <h1>接码数据管理后台</h1>
    
    <h3>添加新记录</h3>
    <input type="text" id="name" placeholder="姓名">
    <input type="text" id="phone" placeholder="手机号（11位）" maxlength="11">
    <input type="text" id="uid" placeholder="ID（可留空）">
    <input type="text" id="link" placeholder="专属接码链接">
    <button onclick="addRecord()">添加这条记录</button>

    <h3 style="margin-top:40px;">当前所有数据</h3>
    <table id="dataTable">
        <thead>
            <tr>
                <th>姓名</th>
                <th>手机号</th>
                <th>ID</th>
                <th>链接</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <div style="margin-top:40px;">
        <button onclick="exportData()" style="background:#0066cc;font-size:17px;padding:14px;">生成 data.json 内容（点击复制）</button>
        <textarea id="jsonOutput" readonly placeholder="点击上方按钮生成正确的 JSON 格式"></textarea>
        <p style="text-align:center;color:#666;margin-top:10px;">复制上面的内容 → 打开 data.json → 全选粘贴 → 提交更新</p>
    </div>
</div>

<script>
// 加载数据
let dataList = [];

async function loadData() {
    try {
        const res = await fetch('data.json?t=' + Date.now());
        dataList = await res.json();
        renderTable();
    } catch(e) {
        alert('加载 data.json 失败，请确认文件存在');
    }
}

function renderTable() {
    const tbody = document.querySelector('#dataTable tbody');
    tbody.innerHTML = '';
    dataList.forEach((item, index) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>${item.name || ''}</td>
            <td>${item.phone}</td>
            <td>${item.id || ''}</td>
            <td class="link-cell">${item.link}</td>
            <td><button class="delete" onclick="deleteRecord(${index})">删除</button></td>
        `;
        tbody.appendChild(tr);
    });
}

function addRecord() {
    const name = document.getElementById('name').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const uid = document.getElementById('uid').value.trim();
    const link = document.getElementById('link').value.trim();

    if (!name || !phone || phone.length !== 11 || !link) {
        alert('姓名、手机号（必须11位）、链接不能为空！');
        return;
    }
    if (dataList.some(item => item.phone === phone)) {
        alert('该手机号已存在，请勿重复添加！');
        return;
    }

    dataList.push({ name, phone, id: uid, link });
    renderTable();
    
    // 清空输入框
    document.getElementById('name').value = '';
    document.getElementById('phone').value = '';
    document.getElementById('uid').value = '';
    document.getElementById('link').value = '';
    
    alert('添加成功！\n请继续添加其他记录，或点击下方按钮生成 JSON');
}

function deleteRecord(index) {
    if (confirm('确定要删除这条记录吗？')) {
        dataList.splice(index, 1);
        renderTable();
    }
}

function exportData() {
    if (dataList.length === 0) {
        alert('当前没有数据');
        return;
    }

    let jsonStr = '[\n';
    dataList.forEach((item, i) => {
        jsonStr += '  ' + JSON.stringify(item, null, 2).replace(/\n/g, '\n  ');
        if (i < dataList.length - 1) jsonStr += ',';
        jsonStr += '\n';
    });
    jsonStr += ']';

    const textarea = document.getElementById('jsonOutput');
    textarea.value = jsonStr;
    
    // 自动复制
    navigator.clipboard.writeText(jsonStr).then(() => {
        alert('✅ 已复制到剪贴板！\n\n请按以下操作更新 data.json：\n1. 打开 data.json 文件\n2. 全选删除原有内容\n3. 粘贴刚才复制的内容\n4. 点击 Commit changes 保存');
    });
}

// 初始化加载
loadData();
</script>
</body>
</html>
